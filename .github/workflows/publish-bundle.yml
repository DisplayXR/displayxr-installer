name: Publish bundle

# Manual-only. NOT auto-fired by component releases — bundle ships at
# the cadence of the *whole stack* being launch-ready, not at the
# cadence of any single component. See issue
# DisplayXR/displayxr-runtime#284 §Release flow.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Bundle release tag (vX.Y.Z)"
        required: true
      prerelease:
        description: "Mark release as prerelease"
        type: boolean
        default: false

permissions:
  contents: write   # release job needs it; drift-guard only reads

jobs:
  # Belt-and-braces drift guard: versions.json in this repo is mirrored
  # byte-for-byte from displayxr-runtime/versions.json by the runtime's
  # versions-bump.yml. If a human hand-edited this repo's file (or the
  # mirror step ever silently failed), the bundle should refuse to
  # build a stack that doesn't match the dev orchestrator's pin matrix.
  # See displayxr-runtime/docs/specs/runtime/versions-json-autobump.md.
  assert-versions-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compare against displayxr-runtime/versions.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub Contents API, not raw.githubusercontent.com — the latter
          # is CDN-cached and can lag 1–5 min after a push, which would
          # produce false positives right after a fresh mirror commit. The
          # Contents API is authoritative; mirror-then-publish is safe.
          gh api repos/DisplayXR/displayxr-runtime/contents/versions.json \
              --jq '.content' | base64 -d > /tmp/runtime-versions.json
          if ! diff -u /tmp/runtime-versions.json versions.json; then
            echo "::error::versions.json drift detected. This file is auto-mirrored from displayxr-runtime; do not hand-edit. If a previous mirror commit failed, re-run displayxr-runtime/.github/workflows/versions-bump.yml (or its BumpVersionsJsonOnTag job) — never patch this file by hand."
            exit 1
          fi
          echo "versions.json matches displayxr-runtime/main — proceeding with bundle build."

  build-macos:
    needs: assert-versions-in-sync
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install jq
        run: brew install jq

      - name: Build macOS bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/build-bundle.sh --version "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v6
        with:
          name: DisplayXRBundle-macOS
          path: _out/DisplayXRBundle-*.pkg
          if-no-files-found: error

  build-windows:
    needs: assert-versions-in-sync
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # choco installs makensis to C:\Program Files (x86)\NSIS\ but
          # does not update PATH for subsequent steps. Append explicitly.
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build Windows bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: cmd
        run: scripts\build-bundle.bat --version "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v6
        with:
          name: DisplayXRBundle-Windows
          path: _out\DisplayXRBundle-*.exe
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          path: _out
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh _out/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: DisplayXR ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            _out/DisplayXRBundle-*.pkg
            _out/DisplayXRBundle-*.exe
          fail_on_unmatched_files: true

      # ---------------------------------------------------------------------
      # THIS WORKFLOW CANNOT SIGN. The EV cert lives on the signing provider's
      # self-hosted runner ($DXR_SIGN_REPO), so the bundle .exe is signed
      # post-hoc by the /installer-release skill (Phase 4.5), which re-uploads
      # the signed asset over the one published above.
      #
      # A raw `gh workflow run publish-bundle` therefore ships an UNSIGNED
      # bundle, and the run still goes green — exactly how v2.0.3 reached
      # users with a SmartScreen warning. This step makes that outcome loud
      # instead of silent. It is deliberately ADVISORY: signing never gates
      # publishing (an unsigned fallback release is still a valid outcome),
      # so it always exits 0 and never turns the run red.
      # ---------------------------------------------------------------------
      - name: Warn if the published bundle is unsigned
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq osslsigncode
          exe=$(ls _out/DisplayXRBundle-*.exe | head -n1)
          out=$(osslsigncode verify -in "$exe" 2>&1 || true)
          # Chain-trust failures are expected here (no MS root on the runner);
          # we only care whether a signature is present at all.
          if printf '%s' "$out" | grep -qi 'No signature found'; then
            echo "::warning title=Bundle published UNSIGNED::$(basename "$exe") has no Authenticode signature. Users will see a SmartScreen warning. Run /installer-release ${{ inputs.tag }} to sign and re-upload."
            {
              echo "### ⚠️ Bundle published UNSIGNED"
              echo
              echo "\`$(basename "$exe")\` carries no Authenticode signature — users will hit SmartScreen."
              echo
              echo "This workflow cannot sign (the cert is on the signing provider's runner)."
              echo "To fix, run: \`/installer-release ${{ inputs.tag }}\` — it signs the .exe and re-uploads it over this asset."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            signer=$(printf '%s' "$out" | grep -i 'Signer.*:' | head -n1 || true)
            echo "Bundle is signed. $signer"
            {
              echo "### ✅ Bundle is signed"
              echo
              echo "\`$(basename "$exe")\` carries an Authenticode signature."
              [ -n "$signer" ] && echo "\`$signer\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # NOTE: the OneDrive upload used to live HERE, but this job runs BEFORE the
      # post-hoc signing (Phase 4.5 of /installer-release), so it always mirrored
      # the UNSIGNED bundle. It now lives in its own `upload-bundle-onedrive.yml`
      # (workflow_dispatch), which the /installer-release skill fires AFTER it has
      # signed the .exe and re-uploaded it over the release asset — so OneDrive
      # always gets the signed bundle. Do NOT re-add an upload step here.
