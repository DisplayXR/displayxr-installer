name: Publish bundle

# Manual-only. NOT auto-fired by component releases — bundle ships at
# the cadence of the *whole stack* being launch-ready, not at the
# cadence of any single component. See issue
# DisplayXR/displayxr-runtime#284 §Release flow.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Bundle release tag (vX.Y.Z)"
        required: true
      prerelease:
        description: "Mark release as prerelease"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: brew install jq

      - name: Build macOS bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/build-bundle.sh --version "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v4
        with:
          name: DisplayXRBundle-macOS
          path: _out/DisplayXRBundle-*.pkg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # choco installs makensis to C:\Program Files (x86)\NSIS\ but
          # does not update PATH for subsequent steps. Append explicitly.
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build Windows bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: cmd
        run: scripts\build-bundle.bat --version "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v4
        with:
          name: DisplayXRBundle-Windows
          path: _out\DisplayXRBundle-*.exe
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: _out
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh _out/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: DisplayXR ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            _out/DisplayXRBundle-*.pkg
            _out/DisplayXRBundle-*.exe
          fail_on_unmatched_files: true
