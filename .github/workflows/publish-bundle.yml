name: Publish bundle

# Manual-only. NOT auto-fired by component releases — bundle ships at
# the cadence of the *whole stack* being launch-ready, not at the
# cadence of any single component. See issue
# DisplayXR/displayxr-runtime#284 §Release flow.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Bundle release tag (vX.Y.Z)"
        required: true
      prerelease:
        description: "Mark release as prerelease"
        type: boolean
        default: false

permissions:
  contents: write   # release job needs it; drift-guard only reads

jobs:
  # Belt-and-braces drift guard: versions.json in this repo is mirrored
  # byte-for-byte from displayxr-runtime/versions.json by the runtime's
  # versions-bump.yml. If a human hand-edited this repo's file (or the
  # mirror step ever silently failed), the bundle should refuse to
  # build a stack that doesn't match the dev orchestrator's pin matrix.
  # See displayxr-runtime/docs/specs/runtime/versions-json-autobump.md.
  assert-versions-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Compare against displayxr-runtime/versions.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub Contents API, not raw.githubusercontent.com — the latter
          # is CDN-cached and can lag 1–5 min after a push, which would
          # produce false positives right after a fresh mirror commit. The
          # Contents API is authoritative; mirror-then-publish is safe.
          gh api repos/DisplayXR/displayxr-runtime/contents/versions.json \
              --jq '.content' | base64 -d > /tmp/runtime-versions.json
          if ! diff -u /tmp/runtime-versions.json versions.json; then
            echo "::error::versions.json drift detected. This file is auto-mirrored from displayxr-runtime; do not hand-edit. If a previous mirror commit failed, re-run displayxr-runtime/.github/workflows/versions-bump.yml (or its BumpVersionsJsonOnTag job) — never patch this file by hand."
            exit 1
          fi
          echo "versions.json matches displayxr-runtime/main — proceeding with bundle build."

  build-macos:
    needs: assert-versions-in-sync
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install jq
        run: brew install jq

      - name: Build macOS bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/build-bundle.sh --version "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v6
        with:
          name: DisplayXRBundle-macOS
          path: _out/DisplayXRBundle-*.pkg
          if-no-files-found: error

  build-windows:
    needs: assert-versions-in-sync
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # choco installs makensis to C:\Program Files (x86)\NSIS\ but
          # does not update PATH for subsequent steps. Append explicitly.
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build Windows bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: cmd
        run: scripts\build-bundle.bat --version "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v6
        with:
          name: DisplayXRBundle-Windows
          path: _out\DisplayXRBundle-*.exe
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    env:
      # Mapped to a job-level env so the OneDrive steps can gate on its
      # presence (the `secrets` context isn't usable in step `if:`). NOT
      # named RCLONE_CONFIG — that's a reserved rclone var pointing at a
      # config *file path*, which would break `rclone copy`.
      RCLONE_CONFIG_CONTENTS: ${{ secrets.RCLONE_CONFIG }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          path: _out
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh _out/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: DisplayXR ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            _out/DisplayXRBundle-*.pkg
            _out/DisplayXRBundle-*.exe
          fail_on_unmatched_files: true

      # Mirror the Windows bundle installer to OneDrive on release. This is
      # the single OneDrive upload point for the whole stack — the runtime
      # repo no longer pushes per-CI build artifacts there. Gated on the
      # RCLONE_CONFIG secret being present (skips cleanly on a fork or if the
      # secret is unset) so the release itself never fails on its absence.
      - name: Install rclone
        if: env.RCLONE_CONFIG_CONTENTS != ''
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.zip
          unzip rclone-current-linux-amd64.zip
          sudo cp rclone-*-linux-amd64/rclone /usr/local/bin/
          rclone --version

      # RENEWING THE EXPIRED ONEDRIVE TOKEN (when this step's upload fails with
      # `invalid_grant: maybe token expired?`): on a machine with the `onedrive:`
      # rclone remote, run `rclone config reconnect onedrive:` and sign in.
      # GOTCHA: reconnect RE-RUNS drive selection and may silently switch to a
      # different drive. Before pushing the refreshed config back into the
      # RCLONE_CONFIG secret, confirm the remote still points at the team
      # SharePoint library, NOT your personal OneDrive:
      #   drive_id   = b!zEagTudx1U2Q_96AptYuE7LwY6TuenBIgA8dwW5Llo_wRfPMIOCRTbgSnwf1KBig
      #   drive_type = documentLibrary
      # Restore those two fields if reconnect changed them, then:
      #   gh secret set RCLONE_CONFIG --repo DisplayXR/displayxr-installer < ~/.config/rclone/rclone.conf
      - name: Setup rclone config
        if: env.RCLONE_CONFIG_CONTENTS != ''
        run: |
          mkdir -p ~/.config/rclone
          printf '%s\n' "$RCLONE_CONFIG_CONTENTS" > ~/.config/rclone/rclone.conf

      - name: Upload Windows bundle installer to OneDrive
        if: env.RCLONE_CONFIG_CONTENTS != ''
        run: |
          destPath="SANDBOX/RUNTIMES + SDK + PLUGINS/OpenXR"
          installer=$(ls _out/DisplayXRBundle-*.exe | head -n1)
          echo "Uploading $(basename "$installer") to OneDrive: $destPath"
          rclone copy "$installer" "onedrive:$destPath" --progress
          echo "Upload complete!"
